<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacer Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Spacer Ranking</div>
        <nav>
            <button id="homeBtn">Главная</button>
            <button id="loginBtn">Вход</button>
            <button id="registerBtn">Регистрация</button>
            <button id="logoutBtn" style="display:none;">Выход</button>
            <span id="userGreeting" style="display:none;"></span>
        </nav>
    </header>

    <main id="content">
        <!-- Здесь будет динамически подгружаться контент -->
        <section id="ratingSection">
            <h2>Рейтинг команд</h2>
            <div id="teamsList" class="card-container"></div>
        </section>

        <section id="matchesSection">
            <h2>Последние матчи</h2>
            <div id="matchesList" class="matches-list"></div>
        </section>

        <!-- Панель лидера (видна только Quantum) -->
        <section id="leaderPanel" style="display:none;">
            <h2>Панель лидера</h2>
            <button id="createTeamBtn">Создать команду</button>
            <button id="createMatchBtn">Создать матч</button>
            <div id="myTeams"></div>
        </section>
    </main>

    <!-- Модальное окно для входа/регистрации/форм -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
